settings:
  deleteSameNameWorkout: true

workouts:
  "W21-深度修復瑜伽 (0518)":
    - sport: yoga
    - warmup: 5min @note(腹式呼吸)
    - interval: 3min @note(下犬式：延伸小腿與足底)
    - interval: 3min @note(鴿式-左：釋放髖關節壓力)
    - interval: 3min @note(鴿式-右：釋放髖關節壓力)
    - interval: 10min @note(靠牆掛腿：促進血液回流)
    - cooldown: 3min @note(大休息)

  "W21-7km T 門檻跑 (0519)":
    - warmup: 2km @H(134-153) @note(Z1 暖身)
    - run: 3km @H(171-180) @note(T 門檻配速 6:07, 步頻 175+)
    - cooldown: 2km @H(134-153) @note(Z1 緩跑)

  "W21-5km Z2 旅遊探索跑 (0520)":
    - run: 5km @H(153-166) @note(日本旅遊首日，Z2 輕鬆探索環境)

  "W21-旅遊舒緩瑜伽 (0521)":
    - sport: yoga
    - warmup: 5min @note(腹式呼吸)
    - interval: 3min @note(下犬式：延伸小腿與足底)
    - interval: 3min @note(鴿式-左：釋放髖關節壓力)
    - interval: 3min @note(鴿式-右：釋放髖關節壓力)
    - interval: 10min @note(靠牆掛腿：促進長時間步行的血液回流)
    - cooldown: 3min @note(大休息)

  "W21-徒手核心維持 (0522)":
    - sport: strength
    - warmup: 10min @note(動態伸展：腿部擺盪、原地輕跳)
    - repeat(3):
      - interval: 15reps @note(深蹲)
      - interval: 12reps @note(保加利亞分腿蹲-左)
      - interval: 12reps @note(保加利亞分腿蹲-右)
      - interval: 15reps @note(死蟲式)
    - cooldown: 5min @note(全身拉伸)

  "W21-休息日 (0523)":
    - sport: yoga
    - warmup: 5min @note(放鬆呼吸)
    - cooldown: 5min @note(完全休息，隨意伸展)

  "W21-10km 輕量長跑 (0524)":
    - warmup: 1km @H(134-153) @note(Z1 暖身)
    - run: 8km @H(153-166) @note(Z2 穩定配速，建立有氧基礎)
    - cooldown: 1km @H(134-153) @note(Z1 緩跑)

schedulePlan:
  start_from: 2026-05-18
  workouts:
