settings:
  deleteSameNameWorkout: true

workouts:
  "W26-跑者核心 (Bodyweight) (0622)":
    - sport: strength
    - warmup: 10min @note(動態伸展：擺腿、側步、毛蟲爬)
    - repeat(3):
      - interval: 10reps @note(單腳硬舉-左)
      - interval: 10reps @note(單腳硬舉-右)
      - interval: 15reps @note(死蟲式)
      - interval: 30s @note(棒式)
    - cooldown: 5min @note(全身拉伸)

  "W26-修復瑜伽 (0622)":
    - sport: yoga
    - warmup: 5min @note(腹式呼吸)
    - interval: 3min @note(下犬式)
    - interval: 3min @note(鴿式-左)
    - interval: 3min @note(鴿式-右)
    - interval: 5min @note(靠牆掛腿)
    - cooldown: 3min @note(大休息)

  "W26-5km Z2 基礎有氧 (0623)":
    - warmup: 1km @H(134-153) @note(Z1 暖身)
    - run: 3km @H(153-166) @note(Z2 基礎有氧，步頻 175+)
    - cooldown: 1km @H(134-153) @note(Z1 緩跑)

  "W26-上半身肌力 (0623)":
    - sport: strength
    - warmup: 5min @note(肩關節活動)
    - repeat(3):
      - interval: 12reps @note(伏地挺身)
      - interval: 15reps @note(啞鈴划船)
    - cooldown: 5min @note(上肢伸展)

  "W26-修復瑜伽 (0623)":
    - sport: yoga
    - interval: 10min @note(睡前舒緩伸展)

  "W26-8km T 門檻跑 (0624)":
    - warmup: 2km @H(134-153) @note(Z1 暖身)
    - run: 4km @H(171-180) @note(T 門檻配速 6:07, 步頻 175+)
    - cooldown: 2km @H(134-153) @note(Z1 緩跑)

  "W26-修復瑜伽 (0624)":
    - sport: yoga
    - interval: 10min @note(睡前舒緩伸展)

  "W26-休息日或輕瑜伽 (0625)":
    - sport: yoga
    - interval: 15min @note(深度放鬆伸展)

  "W26-5km Z2 基礎有氧 (0626)":
    - warmup: 1km @H(134-153) @note(Z1 暖身)
    - run: 3km @H(153-166) @note(Z2 基礎有氧，步頻 175+)
    - cooldown: 1km @H(134-153) @note(Z1 緩跑)

  "W26-下半身肌力 (0626)":
    - sport: strength
    - warmup: 5min @note(髖關節活動)
    - repeat(3):
      - interval: 12reps @note(深蹲)
      - interval: 12reps @note(弓箭步-左)
      - interval: 12reps @note(弓箭步-右)
    - cooldown: 5min @note(下肢伸展)

  "W26-修復瑜伽 (0626)":
    - sport: yoga
    - interval: 10min @note(睡前舒緩伸展)

  "W26-7km Z2 週末輕鬆跑 (0627)":
    - warmup: 1km @H(134-153) @note(Z1 暖身)
    - run: 5km @H(153-166) @note(Z2 基礎有氧)
    - cooldown: 1km @H(134-153) @note(Z1 緩跑)

  "W26-修復瑜伽 (0627)":
    - sport: yoga
    - interval: 10min @note(睡前舒緩伸展)

  "W26-18km LSD 長距離慢跑 (0628)":
    - warmup: 1km @H(134-153) @note(Z1 暖身)
    - run: 16km @H(153-166) @note(Z2/Z3 模擬雪梨馬丘陵地形，配速穩定)
    - cooldown: 1km @H(134-153) @note(Z1 緩跑)

  "W26-修復瑜伽 (0628)":
    - sport: yoga
    - interval: 10min @note(睡前修復伸展)

