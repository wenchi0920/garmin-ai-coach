settings:
  deleteSameNameWorkout: true

workouts:
  "W25-休息日與深度瑜伽 (0615)":
    - sport: yoga
    - warmup: 5min @note(腹式呼吸與靜心)
    - interval: 3min @note(下犬式：延伸小腿與足底)
    - interval: 3min @note(鴿式-左：釋放髖關節壓力)
    - interval: 3min @note(鴿式-右：釋放髖關節壓力)
    - interval: 10min @note(靠牆掛腿：促進血液回流)
    - cooldown: 3min @note(大休息)

  "W25-8km 質量日 T門檻跑 (0616)":
    - warmup: 2km @H(134-153) @note(Z1 暖身)
    - run: 4km @H(171-180) @note(T 門檻配速 6:07, 步頻 175+, 模擬雪梨馬微上坡建議跑步機坡度 1-2%)
    - cooldown: 2km @H(134-153) @note(Z1 緩跑)
    
  "W25-睡前舒緩瑜伽 (0616)":
    - sport: yoga
    - warmup: 5min @note(腹式呼吸)
    - interval: 5min @note(全身輕度伸展)
    - cooldown: 5min @note(大休息)

  "W25-5km Z2 輕鬆跑 (0617)":
    - warmup: 1km @H(134-153) @note(Z1 暖身)
    - run: 3km @H(153-166) @note(Z2 基礎有氧，步頻 175+)
    - cooldown: 1km @H(134-153) @note(Z1 緩跑)

  "W25-上半身重訓 (0617)":
    - sport: strength
    - warmup: 10min @note(動態伸展：肩關節活動)
    - repeat(3):
      - interval: 12reps @note(伏地挺身)
      - interval: 12reps @note(啞鈴划船-左)
      - interval: 12reps @note(啞鈴划船-右)
      - interval: 60s @note(棒式)
    - cooldown: 5min @note(上肢拉伸)

  "W25-睡前舒緩瑜伽 (0617)":
    - sport: yoga
    - warmup: 5min @note(腹式呼吸)
    - interval: 5min @note(全身輕度伸展)
    - cooldown: 5min @note(大休息)

  "W25-5km Z2 輕鬆跑 (0618)":
    - warmup: 1km @H(134-153) @note(Z1 暖身)
    - run: 3km @H(153-166) @note(Z2 基礎有氧，步頻 175+)
    - cooldown: 1km @H(134-153) @note(Z1 緩跑)

  "W25-下半身重訓 (0618)":
    - sport: strength
    - warmup: 10min @note(動態伸展：髖關節活動)
    - repeat(3):
      - interval: 12reps @note(啞鈴深蹲)
      - interval: 12reps @note(單腳硬舉-左)
      - interval: 12reps @note(單腳硬舉-右)
      - interval: 15reps @note(橋式)
    - cooldown: 5min @note(下肢拉伸)

  "W25-睡前舒緩瑜伽 (0618)":
    - sport: yoga
    - warmup: 5min @note(腹式呼吸)
    - interval: 5min @note(全身輕度伸展)
    - cooldown: 5min @note(大休息)

  "W25-跑者核心 (Bodyweight) (0619)":
    - sport: strength
    - warmup: 10min @note(動態伸展)
    - repeat(3):
      - interval: 15reps @note(死蟲式)
      - interval: 30s @note(側棒式-左)
      - interval: 30s @note(側棒式-右)
      - interval: 15reps @note(鳥狗式-左)
      - interval: 15reps @note(鳥狗式-右)
    - cooldown: 5min @note(核心拉伸)

  "W25-睡前舒緩瑜伽 (0619)":
    - sport: yoga
    - warmup: 5min @note(腹式呼吸)
    - interval: 5min @note(全身輕度伸展)
    - cooldown: 5min @note(大休息)

  "W25-8km Z2 週末輕鬆跑 (0620)":
    - warmup: 1km @H(134-153) @note(Z1 暖身)
    - run: 6km @H(153-166) @note(Z2 基礎有氧，維持節奏)
    - cooldown: 1km @H(134-153) @note(Z1 緩跑)

  "W25-睡前舒緩瑜伽 (0620)":
    - sport: yoga
    - warmup: 5min @note(腹式呼吸)
    - interval: 5min @note(全身輕度伸展)
    - cooldown: 5min @note(大休息)

  "W25-18km LSD 長跑 (0621)":
    - warmup: 2km @H(134-153) @note(Z1 暖身)
    - run: 14km @H(153-166) @note(LSD 長跑，模擬賽事體感，Z2心率)
    - cooldown: 2km @H(134-153) @note(Z1 緩跑)

  "W25-跑後修復瑜伽 (0621)":
    - sport: yoga
    - warmup: 5min @note(腹式呼吸)
    - interval: 10min @note(針對下肢深層伸展與滾筒放鬆)
    - cooldown: 5min @note(大休息)

