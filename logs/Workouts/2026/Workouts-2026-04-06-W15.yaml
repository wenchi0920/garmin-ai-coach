settings:
  deleteSameNameWorkout: true

workouts:
  "6km Z2 基礎跑":
    - warmup: 1km @H(134-153) @note(Z1 暖身)
    - run: 4km @H(153-166) @note(Z2 基礎跑，著重步頻 175+)
    - cooldown: 1km @H(134-153) @note(Z1 緩跑)

  "跑者核心與穩定 (徒手)":
    - sport: strength
    - warmup: 10min @note(動態熱身與腳踝活動)
    - repeat(3):
      - interval: 12reps @note(死蟲式 Dead Bug)
      - interval: 10reps @note(單腳 RDL 每側)
      - interval: 45sec @note(側撐體 Side Plank)
      - interval: 10reps @note(保加利亞分腿蹲 每側)
    - cooldown: 5min @note(伸展)

  "10K 賽前體感測試 (T跑)":
    - warmup: 2km @H(153-166) @note(Z2 暖身)
    - repeat(3):
      - run: 1km @note(T 區間配速 5:58-6:10)
      - rest: 2min @note(慢走恢復)
    - cooldown: 1km @H(134-153) @note(Z1 緩跑)

  "跑後放鬆舒緩 (Yoga)":
    - sport: yoga
    - warmup: 5min @note(腹式呼吸)
    - interval: 2min @note(下犬式)
    - interval: 3min @note(鴿式-左)
    - interval: 3min @note(鴿式-右)
    - interval: 2min @note(仰臥抱膝)
    - cooldown: 5min @note(靠牆掛腿)

  "12km Z2 長跑 (LSD)":
    - warmup: 1km @H(134-153) @note(Z1 暖身)
    - run: 10km @H(153-166) @note(Z2 全程穩定輸出，模擬賽事補給)
    - cooldown: 1km @H(134-153) @note(Z1 緩跑)

schedulePlan:
  start_from: 2026-04-06
  workouts:
    - "rest"
    - "6km Z2 基礎跑"
    - "跑者核心與穩定 (徒手)"
    - "10K 賽前體感測試 (T跑)"
    - "跑後放鬆舒緩 (Yoga)"
    - "12km Z2 長跑 (LSD)"
    - "rest"
