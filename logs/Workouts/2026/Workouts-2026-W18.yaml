workouts:
  - name: "W18-修復瑜伽-身心放鬆 (0427)"
    type: "yoga"
    steps:
      - type: "exercise"
        duration: "10:00"
        exercise: "downward_facing_dog"
        description: "保持呼吸，感受小腿後側拉伸"
      - type: "exercise"
        duration: "10:00"
        exercise: "pigeon_pose"
        description: "每邊5分鐘，釋放臀部壓力"
      - type: "exercise"
        duration: "10:00"
        exercise: "hero_pose"
        description: "放鬆大腿前側與足弓"

  - name: "W18-跑者核心與穩定 (0428)"
    type: "strength"
    steps:
      - type: "exercise"
        duration: "10:00"
        exercise: "dead_bug"
        description: "背部貼地，核心用力"
      - type: "exercise"
        duration: "15:00"
        exercise: "plank_pose"
        description: "維持身體直線，不掉腰"
      - type: "exercise"
        duration: "15:00"
        exercise: "bulgarian_split_squat"
        description: "每邊3組，專注單腳穩定"

  - name: "W18-7km Z2 基礎有氧 (0429)"
    type: "running"
    steps:
      - type: "warmup"
        duration: "1km"
      - type: "run"
        duration: "7km"
        target: "7:12-8:02"
      - type: "cooldown"
        duration: "1km"

  - name: "W18-跑者下肢重訓 (0430)"
    type: "strength"
    steps:
      - type: "exercise"
        duration: "15:00"
        exercise: "back_squat"
        description: "負重或徒手，核心收緊"
      - type: "exercise"
        duration: "15:00"
        exercise: "romanian_deadlift"
        description: "感受大腿後側拉伸"
      - type: "exercise"
        duration: "15:00"
        exercise: "calf_raise"
        description: "強化足踝穩定"

  - name: "W18-8km T區間耐力 (0501)"
    type: "running"
    steps:
      - type: "warmup"
        duration: "2km"
      - type: "interval"
        duration: "2km"
        target: "6:00-6:14"
      - type: "rest"
        duration: "02:00"
      - type: "interval"
        duration: "2km"
        target: "6:00-6:14"
      - type: "rest"
        duration: "02:00"
      - type: "cooldown"
        duration: "2km"

  - name: "W18-7km Z2 輕鬆跑 (0502)"
    type: "running"
    steps:
      - type: "run"
        duration: "7km"
        target: "7:12-8:02"
        description: "ONE TOKYO Virtual Race 啟動"

  - name: "W18-16km Z2 長跑 (0503)"
    type: "running"
    steps:
      - type: "run"
        duration: "16km"
        target: "7:12-8:02"
        description: "ONE TOKYO Virtual Race 里程累積"

