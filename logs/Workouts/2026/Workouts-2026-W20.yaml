workouts:
  - name: "W20-6km Z2 輕鬆跑 (0512)"
    type: "running"
    steps:
      - { type: "warmup", duration: "1km", target: "7:12-8:02" }
      - { type: "interval", duration: "4km", target: "7:12-8:02" }
      - { type: "coolishing", duration: "1km", target: "8:02-9:00" }

  - name: "W20-4km T-Pace 乳酸門檻 (0513)"
    type: "running"
    steps:
      - { type: "warmup", duration: "2km", target: "7:12-8:02" }
      - { type: "interval", duration: "1km", target: "6:00-6:15" }
      - { type: "rest", duration: "1:00" }
      - { type: "interval", duration: "1km", target: "6:00-6:15" }
      - { type: "rest", duration: "1:00" }
      - { type: "interval", duration: "1km", target: "6:00-6:15" }
      - { type: "rest", duration: "1:00" }
      - { type: "interval", duration: "1km", target: "6:00-6:15" }
      - { type: "coolishing", duration: "2km", target: "8:02-9:00" }

  - name: "W20-5km Z2 基礎有氧 (0514)"
    type: "running"
    steps:
      - { type: "warmup", duration: "5km", target: "7:12-8:02" }

  - name: "W20-6km Z2 輕鬆跑 (0515)"
    type: "running"
    steps:
      - { type: "warmup", duration: "6km", target: "7:12-8:02" }

  - name: "W20-12km Z2 長跑 (0516)"
    type: "running"
    steps:
      - { type: "warmup", duration: "2km", target: "7:40-8:10" }
      - { type: "interval", duration: "8km", target: "7:12-8:02" }
      - { type: "coolishing", duration: "2km", target: "8:02-9:00" }

  - name: "W20-徒手肌力-核心與穩定 (0512)"
    type: "strength"
    steps:
      - { type: "interval", note: "深蹲 15次", repeat: 3 }
      - { type: "interval", note: "單腳硬舉 10次/腳", repeat: 3 }
      - { type: "interval", note: "棒式 60秒", repeat: 3 }
      - { type: "interval", note: "側棒式 30秒/邊", repeat: 3 }

  - name: "W20-修復瑜伽-跑後舒緩 (0517)"
    type: "yoga"
    steps:
      - { type: "interval", note: "下犬式 2min" }
      - { type: "interval", note: "鴿式 3min/邊" }
      - { type: "interval", note: "嬰兒式 5min" }

schedulePlan:
