settings:
  deleteSameNameWorkout: true

workouts:
  "W27-跑者核心 (Bodyweight) (0629)":
    - sport: strength
    - warmup: 10min @note(動態伸展：擺腿、側步、毛蟲爬)
    - repeat(3):
      - interval: 10reps @note(單腳硬舉-左)
      - interval: 10reps @note(單腳硬舉-右)
      - interval: 12reps @note(保加利亞分腿蹲-左)
      - interval: 12reps @note(保加利亞分腿蹲-右)
      - interval: 15reps @note(死蟲式)
      - interval: 30s @note(側棒式-左)
      - interval: 30s @note(側棒式-right)
    - cooldown: 5min @note(全身拉伸)

  "W27-修復瑜伽 (0629)":
    - sport: yoga
    - warmup: 5min @note(腹式呼吸)
    - interval: 3min @note(下犬式：延伸小腿與足底)
    - interval: 3min @note(鴿式-左：放鬆臀部與髖關節)
    - interval: 3min @note(鴿式-右：放鬆臀部與髖關節)
    - interval: 5min @note(靠牆掛腿：促進血液回流)
    - cooldown: 3min @note(大休息)

  "W27-5km Z2 基礎有氧 (0630)":
    - warmup: 1km @H(134-153) @note(Z1 暖身)
    - run: 3km @H(153-166) @note(Z2 基礎有氧，步頻 175+)
    - cooldown: 1km @H(134-153) @note(Z1 緩跑)

  "W27-上半身肌力 (0630)":
    - sport: strength
    - warmup: 5min @note(肩關節活動)
    - repeat(3):
      - interval: 12reps @note(伏地挺身)
      - interval: 15reps @note(啞鈴划船)
    - cooldown: 5min @note(上肢伸展)

  "W27-修復瑜伽 (0630)":
    - sport: yoga
    - interval: 10min @note(睡前舒緩伸展)

  "W27-9km T 門檻跑 (0701)":
    - warmup: 2km @H(134-153) @note(Z1 暖身)
    - run: 5km @H(171-180) @note(T 門檻配速 6:07, 步頻 175+)
    - cooldown: 2km @H(134-153) @note(Z1 緩跑)

  "W27-修復瑜伽 (0701)":
    - sport: yoga
    - interval: 10min @note(睡前舒緩伸展)

  "W27-休息日或輕瑜伽 (0702)":
    - sport: yoga
    - interval: 15min @note(深度放鬆伸展)

  "W27-6km Z2 基礎有氧 (0703)":
    - warmup: 1km @H(134-153) @note(Z1 暖身)
    - run: 4km @H(153-166) @note(Z2 基礎有氧，步頻 175+)
    - cooldown: 1km @H(134-153) @note(Z1 緩跑)

  "W27-下半身肌力 (0703)":
    - sport: strength
    - warmup: 5min @note(髖關節活動)
    - repeat(3):
      - interval: 12reps @note(深蹲)
      - interval: 12reps @note(弓箭步-左)
      - interval: 12reps @note(弓箭步-右)
    - cooldown: 5min @note(下肢伸展)

  "W27-修復瑜伽 (0703)":
    - sport: yoga
    - interval: 10min @note(睡前舒緩伸展)

  "W27-8km Z2 週末輕鬆跑 (0704)":
    - warmup: 1km @H(134-153) @note(Z1 暖身)
    - run: 6km @H(153-166) @note(Z2 基礎有氧，步頻 175+)
    - cooldown: 1km @H(134-153) @note(Z1 緩跑)

  "W27-修復瑜伽 (0704)":
    - sport: yoga
    - interval: 10min @note(睡前舒緩伸展)

  "W27-18km LSD 長距離慢跑 (0705)":
    - warmup: 1km @H(134-153) @note(Z1 暖身)
    - run: 16km @H(153-166) @note(Z2/Z3 模擬雪梨馬丘陵地形，配速穩定，完成線上賽)
    - cooldown: 1km @H(134-153) @note(Z1 緩跑)

  "W27-修復瑜伽 (0705)":
    - sport: yoga
    - interval: 10min @note(睡前修復伸展)

