services:
  gemini:
    build:
      context: .
      args:
        - USER_ID=1000
        - GROUP_ID=1000
    container_name: garmin-ai-coach
    restart: always
    stdin_open: true
    tty: true
    environment:
      - TZ=Asia/Taipei
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - LANG=C.UTF-8
    working_dir: /app
    entrypoint: ["/bin/sh", "-c"]
    command: "bash /app/init.sh"
    volumes:
      # 掛載宿主機的認證目錄，確保 UID 1000 有權�目錄
      - gemini_config:/home/gemini/.gemini
      - root:/root/
      - ./:/app
      - ../garmin-tools-kit/data:/app/data
      - ../garmin-tools-kit:/app/garmin-tools-kit
      - ../garmin-tools-kit/data:/app/garmin-tools-kit/data
    # 避免 CLI 執行完就絀求開啟以下指令
    # command: ["chat"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"    

volumes:
  gemini_config:
  root:  

